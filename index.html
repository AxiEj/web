<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRAME — 影视图片</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 导航 -->
  <nav>
    <div class="nav-inner">
      <span class="logo">FRAME</span>
      <span class="nav-sub">影视美学</span>
    </div>
  </nav>

  <!-- Hero 全屏第一张 -->
  <section class="hero">
    <div class="hero-img" style="background-image: url('images/01.jpg')"></div>
    <div class="hero-caption">
      <span class="caption-tag">封面</span>
      <h1>影像之美</h1>
      <p>用一帧画面，讲述一个故事</p>
    </div>
    <div class="scroll-hint">↓</div>
  </section>

  <!-- 图片流 -->
  <main class="gallery">

    <article class="frame frame-full">
      <div class="frame-img" style="background-image: url('images/02.jpg')"></div>
      <div class="frame-info">
        <span class="year">2024</span>
        <h2>电影名称一</h2>
      </div>
    </article>

    <article class="frame frame-half">
      <div class="frame-img" style="background-image: url('images/03.jpg')"></div>
      <div class="frame-info">
        <span class="year">2023</span>
        <h2>电影名称二</h2>
      </div>
    </article>

    <article class="frame frame-half">
      <div class="frame-img" style="background-image: url('images/04.jpg')"></div>
      <div class="frame-info">
        <span class="year">2023</span>
        <h2>电影名称三</h2>
      </div>
    </article>

    <article class="frame frame-wide">
      <div class="frame-img" style="background-image: url('images/05.jpg')"></div>
      <div class="frame-info">
        <span class="year">2022</span>
        <h2>电影名称四</h2>
      </div>
    </article>

    <article class="frame frame-portrait">
      <div class="frame-img" style="background-image: url('images/06.jpg')"></div>
      <div class="frame-info">
        <span class="year">2022</span>
        <h2>电影名称五</h2>
      </div>
    </article>

    <article class="frame frame-full">
      <div class="frame-img" style="background-image: url('images/07.jpg')"></div>
      <div class="frame-info">
        <span class="year">2021</span>
        <h2>电影名称六</h2>
      </div>
    </article>

  </main>

  <footer>
    <span>FRAME &copy; 2026</span>
  </footer>

  <script src="main.js"></script>
</body>
</html>
