<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRAME</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <span class="logo">FRAME</span>
  </nav>

  <section class="hero">
    <div class="hero-img" style="background-image: url('images/01.jpg')"></div>
    <div class="scroll-hint">↓</div>
  </section>

  <main class="gallery">

    <article class="frame frame-full">
      <div class="frame-img" style="background-image: url('images/02.jpg')"></div>
    </article>

    <article class="frame frame-half">
      <div class="frame-img" style="background-image: url('images/03.jpg')"></div>
    </article>

    <article class="frame frame-half">
      <div class="frame-img" style="background-image: url('images/04.jpg')"></div>
    </article>

    <article class="frame frame-wide">
      <div class="frame-img" style="background-image: url('images/05.jpg')"></div>
    </article>

    <article class="frame frame-portrait">
      <div class="frame-img" style="background-image: url('images/06.jpg')"></div>
    </article>

    <article class="frame frame-full">
      <div class="frame-img" style="background-image: url('images/07.jpg')"></div>
    </article>

  </main>

  <footer>
    <span>FRAME &copy; 2026</span>
  </footer>

  <script src="main.js"></script>
</body>
</html>
