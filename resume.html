  }

  .hdr {

    align-items: end;
    gap: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 36px;
  }
  .hdr .name {
    font-family: var(--serif);
    font-size: 64px;
    font-weight: 500;
    letter-spacing: 0.02em;
    line-height: 1;
    color: var(--ink);

  .hdr .name .en {

    font-style: italic;
    font-weight: 400;

  .hdr .role {

    color: var(--ink-2);

  .hdr .meta {

    grid-template-columns: 280px 1fr;
    gap: 56px;

    .hdr .meta { text-align: left; }
    .hdr .name { font-size: 44px; }

  .sec { margin-bottom: 40px; }
  .sec-label {

    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sec-label::before {

    width: 18px;
    height: 1px;
    background: var(--accent);
  }
  .sec-title {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 500;

    padding: 6px 0;

  .side .row:last-child { border-bottom: 0; }
  .side .row .k {

    text-transform: uppercase;

    gap: 8px;

    font-size: 32px;
    font-weight: 500;
    color: var(--accent-2);

    font-size: 10.5px;
    padding: 4px 9px;
    border: 1px solid var(--rule);
    border-radius: 100px;
    color: var(--ink-2);
    background: var(--paper-2);
    letter-spacing: 0.04em;

  .bar .track {

    border-radius: 100px; overflow: hidden;
    border: 1px solid var(--rule);

  .bar .fill {

    background: linear-gradient(90deg, var(--accent), var(--accent-2));

    transform-origin: left;

    margin-bottom: 32px;
    font-weight: 300;

  .tl-item { position: relative; margin-bottom: 26px; }

    content: ""; position: absolute; left: -22px; top: 8px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--paper);
    border: 1.5px solid var(--accent);

    font-size: 17px;
    font-weight: 600;
    color: var(--ink);

  .tl-head .when {

    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;

    gap: 18px;
  }

  .skill-card {

  .skill-card .num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
    position: absolute;
    top: 14px; right: 14px;
  }
  .skill-card h3 {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);

  .skill-card .tag {
    font-size: 11px;
    color: var(--accent-2);
    font-style: italic;
    margin-bottom: 10px;
    font-family: var(--serif);

    gap: 18px;

  .pub:last-child { border-bottom: 1px solid var(--rule); }
  .pub .yr {

    color: var(--ink-2);

  .pub .if {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--accent-2);
    border: 1px solid var(--accent-2);
    padding: 4px 8px;
    letter-spacing: 0.05em;
    white-space: nowrap;
    align-self: start;

  .award-grid {

  }
  @media (max-width: 750px) { .award-grid { column-count: 1; } }
  .award {
    break-inside: avoid;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px dashed var(--rule);
    font-size: 12.5px;
    align-items: baseline;
  }
  .award .d {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.05em;
  }
  .award .t { color: var(--ink); }
  .award .t .scope {
    font-size: 9.5px;
    background: var(--accent);
    color: #fff;
    padding: 1px 5px;
    margin-left: 6px;
    border-radius: 2px;
    letter-spacing: 0.05em;
    font-family: var(--mono);
    text-transform: uppercase;
    vertical-align: 1px;
  }
  .award .t .scope.prov { background: var(--accent-2); }
  .award .t .scope.nat { background: #1a1f2c; }
  [data-theme="dark"] .award .t .scope.nat { background: #d97a5e; color: #11151c; }

  /* signature block */
  .sig {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
  }
  .sig .quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    color: var(--ink-2);
    line-height: 1.6;
    max-width: 520px;
  }
  .sig .stamp {
    text-align: right;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    text-transform: uppercase;
    line-height: 1.8;
  }
  .sig .stamp .seal {
    display: inline-block;
    width: 64px;
    height: 64px;
    border: 1.5px solid var(--accent-2);
    color: var(--accent-2);
    border-radius: 50%;
    margin-bottom: 8px;
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 700;
    display: grid;
    place-items: center;
    transform: rotate(-6deg);
    letter-spacing: 0.1em;
  }

  /* nameplate corner */
  .corner {
    position: absolute;
    top: 0; right: 0;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border: 1px solid var(--rule);
    background: var(--paper-2);
    text-transform: uppercase;
  }

  @media print {
    .resume-nav { display: none; }
    .page-wrap {
      width: 100%;
      min-height: auto;
      padding: 0;
      zoom: 1;
    }
  }
</style>
</head>

                  <div className="award"><span className="d">2023.10</span><span className="t">「外研社·国才杯」「理解当代中国」全国大学生外语能力大赛 · 英语组阅读 一等奖<span className="scope">校级</span></span></div>
                  <div className="award"><span className="d">2024.04</span><span className="t">综评二等奖学金</span></div>
                  <div className="award"><span className="d">2024.04</span><span className="t">枫叶杯演讲比赛 二等奖<span className="scope">校级</span></span></div>
                  <div className="award"><span className="d">2024.07</span><span className="t">词达人省赛 三等奖<span className="scope prov">省级</span></span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">大商奖学金</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">综评二等奖学金</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">学习优秀二等奖学金</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">文明修身奖学金</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">社会工作奖学金</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">文体活动奖学金</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">优良学风先进个人</span></div>
                  <div className="award"><span className="d">2024.10</span><span className="t">优秀学生干部</span></div>
                </div>
              </div>

              {/* Self */}
              <div className="sec">
                <div className="sec-label">Self · 自我评价</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
                  <div style={{ padding: '16px 18px', borderLeft: '2px solid var(--accent)', background: 'var(--paper-2)' }}>
                    <div style={{ fontFamily: 'var(--serif)', fontSize: 15, fontWeight: 600, marginBottom: 6 }}>做过计算+湿实验</div>
                    <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.65 }}>
                      本科阶段同时接触了计算（分子模拟 / 生信）和湿实验（细胞 / 动物 / qPCR）。
                    </div>
                  </div>
                  <div style={{ padding: '16px 18px', borderLeft: '2px solid var(--accent-2)', background: 'var(--paper-2)' }}>
                    <div style={{ fontFamily: 'var(--serif)', fontSize: 15, fontWeight: 600, marginBottom: 6 }}>对计算化学和天然药物化学有热情</div>
                    <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.65 }}>
                      自学计算化学公社、卢天老师课程，常常感觉「有力发不出」——
                      希望能在老师指导下系统训练，把感兴趣的方法真正用起来。
                    </div>
                  </div>
                  <div style={{ padding: '16px 18px', borderLeft: '2px solid var(--ink-3)', background: 'var(--paper-2)', gridColumn: '1 / -1' }}>
                    <div style={{ fontFamily: 'var(--serif)', fontSize: 15, fontWeight: 600, marginBottom: 6 }}>理性、不怕被指正</div>
                    <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.65 }}>
                      喜欢辩论但不为面子辩护，错了就认；老师指出问题时把它当成最快的学习路径，而不是被冒犯。
                    </div>
                  </div>
                </div>
              </div>

              {/* Signature */}
              <div className="sig">
                <div className="quote">
                  「目前能做的事还有限，希望能在老师指导下，把感兴趣的方法慢慢做扎实。」
                </div>
                <div className="stamp">
                  {tweaks.showSeal && <div className="seal">XJH</div>}
                  <div>谢佳豪 / Xie Jiahao</div>
                  <div>Dalian Medical Univ.</div>
                  <div><a href="https://axiejohn.com/" style={{ color: 'inherit', textDecoration: 'none' }}>axiejohn.com</a></div>
                </div>
              </div>
            </main>
          </div>
        </article>
      </div>

      {window.TweaksPanel && <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Theme">
            <window.TweakSelect
            label="Style"
            value={tweaks.theme}
            onChange={(v) => setTweak('theme', v)}
            options={[
            { label: '学术经典 (Academic)', value: 'academic' },
            { label: '极简白卡 (Minimal)', value: 'minimal' },
            { label: '暗色专业 (Dark)', value: 'dark' }]
            } />
          
            <window.TweakColor label="主色 Accent" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
            <window.TweakColor label="强调色 Accent 2" value={tweaks.accent2} onChange={(v) => setTweak('accent2', v)} />
            <window.TweakToggle label="显示印章" value={tweaks.showSeal} onChange={(v) => setTweak('showSeal', v)} />
          </window.TweakSection>
          <window.TweakSection title="Lead Statement">
            <window.TweakText label="开篇陈述" value={tweaks.lead} onChange={(v) => setTweak('lead', v)} multiline />
          </window.TweakSection>
        </window.TweaksPanel>
      }
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
